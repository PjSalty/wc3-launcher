version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]

  # GitHub Actions: keeps the SHA-pinned actions in .github/workflows current
  # (Dependabot bumps the pin and the comment together).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
