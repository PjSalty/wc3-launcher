# Build the launcher friends download to play, and cut signed releases on a tag.
name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Least privilege by default; the build/release job elevates only what it needs.
permissions:
  contents: read

env:
  GOTOOLCHAIN: local # pin to the toolchain in go.mod, never auto-download

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'
      - name: gofmt (must be clean)
        run: |
          fmt="$(gofmt -l .)"
          if [ -n "$fmt" ]; then echo "gofmt needed:"; echo "$fmt"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: govulncheck (dependency + stdlib CVEs)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    needs: check
    # Only ship binaries on a tag or a default-branch push, never on PRs.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach binaries to a Release on a v* tag
      id-token: write # keyless cosign signing via GitHub OIDC (Fulcio/Rekor)
      attestations: write # build provenance attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'

      - name: Cross-compile launcher (generic, no secrets)
        run: |
          set -euo pipefail
          # SECURITY: this public build is deliberately GENERIC. It never injects a
          # server address, relay token, or cert pin, so a released binary can never
          # carry anything private. The server is supplied at RUN time by whoever
          # runs it (first-run prompt, --server / WC3_SERVER, or wc3-launcher.json).
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          LDFLAGS="-s -w -X main.launcherVersion=${VERSION}"
          mkdir -p dist
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/wc3-launcher.exe .
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/wc3-launcher .
          (cd dist && sha256sum wc3-launcher.exe wc3-launcher | tee SHA256SUMS)
          ls -la dist/

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: dist/wc3-launcher.sbom.spdx.json

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign binaries + checksums (keyless)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          # Keyless signing via GitHub OIDC: no private key, verifiable against the
          # public Rekor transparency log. Players verify with
          #   cosign verify-blob --bundle <file>.cosign.bundle <file>
          for f in dist/wc3-launcher.exe dist/wc3-launcher dist/SHA256SUMS; do
            cosign sign-blob --yes "$f" --bundle "$f.cosign.bundle"
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wc3-launcher
          path: dist/
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/wc3-launcher.exe
            dist/wc3-launcher
            dist/SHA256SUMS
            dist/wc3-launcher.sbom.spdx.json
            dist/*.cosign.bundle
