# Build the launcher friends download to play.
name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write # needed to attach binaries to a Release on a v* tag

env:
  GOTOOLCHAIN: local # pin to the toolchain in go.mod, never auto-download

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: gofmt (must be clean)
        run: |
          # gofmt -l prints files that need formatting; empty output = clean.
          fmt="$(gofmt -l .)"
          if [ -n "$fmt" ]; then
            echo "gofmt needed:"
            echo "$fmt"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  build:
    needs: check
    # Only ship binaries on a tag or a default-branch push, never on PRs.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Cross-compile launcher (generic, no secrets)
        run: |
          set -euo pipefail

          # SECURITY: this public build is deliberately GENERIC. It never injects
          # a server address, relay token, or cert pin, so a released binary can
          # never carry anything private. The server is supplied at RUN time by
          # the person who runs it (first-run prompt, --server / WC3_SERVER env,
          # or a wc3-launcher.json). A baked-in build, if ever wanted, is done in
          # a private pipeline, never in this public one.

          # Stamp the launcher's own version: the git tag on a tag build, else
          # the short SHA. main.launcherVersion drives the banner and --version.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi

          LDFLAGS="-s -w -X main.launcherVersion=${VERSION}"

          mkdir -p dist
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/wc3-launcher.exe .
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/wc3-launcher .

          # Publish checksums so a download can be verified. The binaries are not
          # signed yet, so the checksum is the integrity check players should use.
          (cd dist && sha256sum wc3-launcher.exe wc3-launcher | tee SHA256SUMS)
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wc3-launcher
          path: |
            dist/wc3-launcher.exe
            dist/wc3-launcher
            dist/SHA256SUMS
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wc3-launcher.exe
            dist/wc3-launcher
            dist/SHA256SUMS
